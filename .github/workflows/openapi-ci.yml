name: OpenAPI CI

permissions:
  contents: read
on:
  pull_request:
    paths:
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'
  push:
    paths:
      - 'docs/openapi/**'
      - '.github/workflows/openapi-ci.yml'

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Validate OpenAPI schema structure
        run: npx --yes @apidevtools/swagger-cli@4.0.4 validate docs/openapi/*.yaml

      - name: Lint OpenAPI style and quality
        run: npx --yes @redocly/cli@1.27.1 lint docs/openapi/*.yaml
