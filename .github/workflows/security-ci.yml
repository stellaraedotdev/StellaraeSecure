name: Security CI

on:
  pull_request:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '.github/workflows/security-ci.yml'
  push:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '.github/workflows/security-ci.yml'

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: oauth2
            audit_args: ''
          - service: 2fa
            # RUSTSEC-2023-0071: rsa Marvin Attack via sqlx-mysql (optional dep,
            # never compiled; only SQLite is used). No upstream patch available.
            audit_args: --ignore RUSTSEC-2023-0071
          - service: staffdb
            # RUSTSEC-2023-0071: rsa Marvin Attack via sqlx-mysql (optional dep,
            # never compiled; only SQLite is used). No upstream patch available.
            audit_args: --ignore RUSTSEC-2023-0071

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit ${{ matrix.audit_args }}

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem security scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
