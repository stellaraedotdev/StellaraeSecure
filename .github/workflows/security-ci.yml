name: Security CI

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '.github/workflows/security-ci.yml'
  push:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '.github/workflows/security-ci.yml'

jobs:
  cargo-audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [oauth2, staffdb, 2fa]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937e1183a768ceffc36a47ee91e867d9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e645b0cf01249a4b0404e0248fbf6b432f092ad3

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937e1183a768ceffc36a47ee91e867d9

      - name: Trivy filesystem security scan
        uses: aquasecurity/trivy-action@6e7b7d1feac6b6d0511ae5a28ed1e954671674c7
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
