# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# rust-clippy is a tool that runs a bunch of lints to catch common
# mistakes in your Rust code and help improve your Rust code.
# More details at https://github.com/rust-lang/rust-clippy
# and https://rust-lang.github.io/rust-clippy/

name: rust-clippy analyze

on:
  push:
    branches: [ "main" ]
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/rust-clippy.yml'
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/rust-clippy.yml'
  schedule:
    - cron: '23 6 * * 3'

jobs:
  rust-clippy-analyze:
    name: Run rust-clippy analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    strategy:
      fail-fast: false
      matrix:
        service: [oauth2, staffdb, 2fa]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2ca385c197f3201aa80dc04f5be82c4bf9937ec2
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install required cargo
        run: cargo install --locked clippy-sarif sarif-fmt

      - name: Run rust-clippy
        run: |
          cargo clippy --all-features --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt

      - name: Upload analysis results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a
        with:
          sarif_file: ${{ matrix.service }}/rust-clippy-results.sarif
          wait-for-processing: true
