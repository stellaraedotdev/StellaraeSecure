name: Release Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Image tag to publish (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Validate semantic tag and changelog entry
        if: github.ref_type == 'tag'
        run: |
          chmod +x scripts/release/validate-tag.sh
          scripts/release/validate-tag.sh "${GITHUB_REF_NAME}"

  publish:
    runs-on: ubuntu-latest
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: staffdb
            context: staffdb
            dockerfile: staffdb/Dockerfile
          - name: oauth2
            context: oauth2
            dockerfile: oauth2/Dockerfile
          - name: twofa
            context: 2fa
            dockerfile: 2fa/Dockerfile
          - name: admin
            context: admin
            dockerfile: admin/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31ad740b84434e8c0289

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd902187a7c231891a83b6c1c3af

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c1be7afe02b547c13601546cdf1262c263
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.imageTag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@15560696de7e36d87c2fb8092102eec3d3b588fa
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/stellarae-${{ matrix.name }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/stellarae-${{ matrix.name }}:latest
