name: Backend CI

on:
  pull_request:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/backend-ci.yml'
  push:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [oauth2, staffdb, 2fa]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: |
            oauth2
            staffdb
            2fa

      - name: Run tests
        run: cargo test
