name: Backend CI

on:
  pull_request:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/backend-ci.yml'
  push:
    paths:
      - 'oauth2/**'
      - '2fa/**'
      - 'staffdb/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [oauth2, staffdb, 2fa]

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e645b0cf01249a4b0404e0248fbf6b432f092ad3

      - name: Cache cargo
        uses: Swatinem/rust-cache@a21bda3d3d0ea852a2a89a0a6978b4d0f15477b8
        with:
          workspaces: |
            oauth2
            staffdb
            2fa

      - name: Run tests
        run: cargo test
